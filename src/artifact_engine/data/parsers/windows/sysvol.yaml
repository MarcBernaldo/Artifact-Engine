id: sysvol
name: "SYSVOL (Group Policy Preferences + scripts)"
description: "Domain-controller SYSVOL: Group Policy Preferences (scheduled tasks, groups, services pushed domain-wide) with GPP cpassword decrypted (MS14-025), and logon/logoff/startup/shutdown script assignments. Only DCs have SYSVOL, so this runs there alone. suspicious = any stored cpassword, a GPP task command out of a staging dir / LOLBin, a group adding to Administrators, or a script from a temp/public/web path."
os: windows
category: persistence
handler: "artifact_engine.handlers.win_sysvol:run"
requires: ["Windows/SYSVOL"]
provides: [sysvol_csv]
# SYSVOL barely changes and a snapshot mirrors the live DC -> no need on VSS.
on_vss: false
outputs:
  - path: "{out}/sysvol_gpp.csv"
    format: csv
  - path: "{out}/sysvol_scripts.csv"
    format: csv
