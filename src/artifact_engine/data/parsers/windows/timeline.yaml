id: timeline
name: "Windows Timeline"
description: "Win10 Timeline ActivitiesCache.db per user (apps run, files opened, focus duration) parsed natively from the SQLite store. suspicious = app/opened file out of a staging dir or a LOLBin."
os: windows
category: execution
handler: "artifact_engine.handlers.win_timeline:run"
requires: ["Users"]
provides: [timeline_csv]
outputs:
  - path: "{out}/timeline.csv"
    format: csv
