id: evtx_sysmon
name: "EVTX: Sysmon"
description: "Sysmon Operational (if present)"
os: windows
category: eventlogs
requires: ["Windows/System32/winevt/Logs/Microsoft-Windows-Sysmon%4Operational.evtx"]
provides: [evtx_sysmon_csv]
tool:
  binary: EvtxECmd/EvtxECmd.exe
  source:
    url: "https://download.ericzimmermanstools.com/net9/EvtxECmd.zip"
    unpack: true
command:
  - "{binary}"
  - "-f"
  - "{evidence}/Windows/System32/winevt/Logs/Microsoft-Windows-Sysmon%4Operational.evtx"
  - "--csv"
  - "{out}"
  - "--csvf"
  - "evtx_sysmon.csv"
timeout: 600
