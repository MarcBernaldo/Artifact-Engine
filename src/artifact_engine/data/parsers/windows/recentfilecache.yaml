id: recentfilecache
name: "RecentFileCache"
description: "RecentFileCache.bcf - program execution (Win7) - RecentFileCacheParser"
os: windows
category: execution
requires: ["Windows/AppCompat/Programs/RecentFileCache.bcf"]
provides: [recentfilecache_csv]
tool:
  binary: RecentFileCacheParser.exe
  source:
    url: "https://download.ericzimmermanstools.com/net9/RecentFileCacheParser.zip"
    unpack: true
command:
  - "{binary}"
  - "-f"
  - "{evidence}/Windows/AppCompat/Programs/RecentFileCache.bcf"
  - "--csv"
  - "{out}"
  - "--csvf"
  - "recentfilecache.csv"
timeout: 300
