id: evtx_defender
name: "EVTX: Defender"
description: "Windows Defender detections"
os: windows
category: eventlogs
requires: ["Windows/System32/winevt/Logs/Microsoft-Windows-Windows Defender%4Operational.evtx"]
provides: [evtx_defender_csv]
tool:
  binary: EvtxECmd/EvtxECmd.exe
  source:
    url: "https://download.ericzimmermanstools.com/net9/EvtxECmd.zip"
    unpack: true
command:
  - "{binary}"
  - "-f"
  - "{evidence}/Windows/System32/winevt/Logs/Microsoft-Windows-Windows Defender%4Operational.evtx"
  - "--csv"
  - "{out}"
  - "--csvf"
  - "evtx_defender.csv"
timeout: 600
