id: reg_services
name: "Registry: Services"
description: "Registered services (persistence) - SYSTEM hive"
os: windows
category: registry
requires: ["Windows/System32/config/SYSTEM"]
provides: [reg_services_csv]
tool:
  binary: RECmd/RECmd.exe
  source:
    url: "https://download.ericzimmermanstools.com/net9/RECmd.zip"
    unpack: true
command:
  - "{binary}"
  - "-d"
  - "{evidence}/Windows/System32/config"
  - "--bn"
  - "{assets}/recmd/Services.reb"
  - "--nl"
  - "false"
  - "--csv"
  - "{out}"
  - "--csvf"
  - "reg_services.csv"
timeout: 600
