id: evtx_powershell_scripts
name: "EVTX: PowerShell Scripts"
description: "PowerShell Operational (events 4104, 4103: script blocks)"
os: windows
category: eventlogs
requires: ["Windows/System32/winevt/Logs/Microsoft-Windows-PowerShell%4Operational.evtx"]
provides: [evtx_powershell_scripts_csv]
tool:
  binary: EvtxECmd/EvtxECmd.exe
  source:
    url: "https://download.ericzimmermanstools.com/net9/EvtxECmd.zip"
    unpack: true
command:
  - "{binary}"
  - "-f"
  - "{evidence}/Windows/System32/winevt/Logs/Microsoft-Windows-PowerShell%4Operational.evtx"
  - "--csv"
  - "{out}"
  - "--csvf"
  - "evtx_pwshScrip.csv"
  - "--inc"
  - "4104,4103"
timeout: 600
