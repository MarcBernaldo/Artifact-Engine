id: reg_shellbags
name: "Shellbags (folder access history)"
description: "Accessed-folder history (shellbags) with SBECmd -- evidence a user browsed to a folder, even one since deleted or on removed media"
os: windows
category: shellbags   # own folder (FilesystemAccess/), not buried under Registry/
short: shellbags      # SBECmd writes one CSV per user/hive; short prefixes them (shellbags_<user>_<hive>)
requires: ["Users"]
provides: [reg_shellbags_csv]
tool:
  binary: SBECmd.exe
  source:
    url: "https://download.ericzimmermanstools.com/net9/SBECmd.zip"
    unpack: true
command:
  - "{binary}"
  - "-d"
  - "{evidence}/Users"
  - "--csv"
  - "{out}"
timeout: 600
