id: evtx_rdp_auth
name: "EVTX: RDP auth"
description: "RemoteConnectionManager: RDP auth (1149,1148)"
os: windows
category: eventlogs
requires: ["Windows/System32/winevt/Logs/Microsoft-Windows-TerminalServices-RemoteConnectionManager%4Operational.evtx"]
provides: [evtx_rdp_auth_csv]
tool:
  binary: EvtxECmd/EvtxECmd.exe
  source:
    url: "https://download.ericzimmermanstools.com/net9/EvtxECmd.zip"
    unpack: true
command:
  - "{binary}"
  - "-f"
  - "{evidence}/Windows/System32/winevt/Logs/Microsoft-Windows-TerminalServices-RemoteConnectionManager%4Operational.evtx"
  - "--csv"
  - "{out}"
  - "--csvf"
  - "evtx_rdpAuth.csv"
  - "--inc"
  - "1149,1148"
timeout: 600
