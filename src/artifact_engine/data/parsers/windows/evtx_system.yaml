id: evtx_system
name: "EVTX: System"
description: "System log events"
os: windows
category: eventlogs
requires: ["Windows/System32/winevt/Logs/System.evtx"]
provides: [evtx_system_csv]
tool:
  binary: EvtxECmd/EvtxECmd.exe
  source:
    url: "https://download.ericzimmermanstools.com/net9/EvtxECmd.zip"
    unpack: true
command:
  - "{binary}"
  - "-f"
  - "{evidence}/Windows/System32/winevt/Logs/System.evtx"
  - "--csv"
  - "{out}"
  - "--csvf"
  - "evtx_system.csv"
timeout: 1200
