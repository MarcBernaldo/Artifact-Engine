id: evtx_rdp_in
name: "EVTX: RDP inbound"
description: "RdpCoreTS Operational (events 131, 98: inbound RDP connections)"
os: windows
category: eventlogs
requires: ["Windows/System32/winevt/Logs/Microsoft-Windows-RemoteDesktopServices-RdpCoreTS%4Operational.evtx"]
provides: [evtx_rdp_in_csv]
tool:
  binary: EvtxECmd/EvtxECmd.exe
  source:
    url: "https://download.ericzimmermanstools.com/net9/EvtxECmd.zip"
    unpack: true
command:
  - "{binary}"
  - "-f"
  - "{evidence}/Windows/System32/winevt/Logs/Microsoft-Windows-RemoteDesktopServices-RdpCoreTS%4Operational.evtx"
  - "--csv"
  - "{out}"
  - "--csvf"
  - "evtx_rdpIn.csv"
  - "--inc"
  - "131,98"
timeout: 600
