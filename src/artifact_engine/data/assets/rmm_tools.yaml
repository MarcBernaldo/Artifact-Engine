    paths: ["\\dameware"]
  - name: Chrome Remote Desktop
    files: [remoting_host.exe]
    paths: ["\\chrome remote desktop"]
  - name: Parsec
    files: [parsecd.exe]
    paths: ["\\parsec"]
  - name: Pulseway
    files: [pcmonitorsrv.exe, pcmonitormanager.exe]
    paths: ["\\pulseway"]
  - name: Supremo
