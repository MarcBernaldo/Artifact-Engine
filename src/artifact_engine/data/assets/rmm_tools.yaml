# Remote Monitoring & Management (RMM) / remote-access tools commonly abused by
# intruders for hands-on access and persistence. Curated from LOLRMM (lolrmm.io).
#
# These are DUAL-USE: legitimate IT software. A match is a lead ("this remote-access
# tool touched the box"), not a verdict -- the analyst confirms whether it is
# authorised. Matching (win_rmm handler) is on the exact executable basename
# (`files`, lower-case) OR an install-path substring (`paths`, lower-case, verbatim).
# `paths` use a LEADING backslash and NO trailing one so they anchor to a path
# component yet still match suffixed install folders (e.g. "\\screenconnect" matches
# "...\ScreenConnect Client (abc123)\..."); the `files` net catches renamed binaries.
# The built-in Windows Quick Assist is left out on purpose (present everywhere).
tools:
  - name: AnyDesk
    files: [anydesk.exe]
    paths: ["\\anydesk"]
  - name: TeamViewer
    files: [teamviewer.exe, teamviewer_service.exe, tv_w32.exe, tv_x64.exe]
    paths: ["\\teamviewer"]
  - name: ConnectWise ScreenConnect
    files: [screenconnect.clientservice.exe, screenconnect.windowsclient.exe,
            connectwisecontrol.client.exe]
    paths: ["\\screenconnect", "\\connectwisecontrol"]
  - name: Atera
    files: [ateraagent.exe]
    paths: ["\\ateraagent"]
  - name: Splashtop
    files: [sragent.exe, srserver.exe, srmanager.exe, splashtopstreamer.exe, strwinclt.exe]
    paths: ["\\splashtop"]
  - name: Syncro
    files: [syncro.exe, syncrolive.exe, kabuto.app.runner.exe]
    paths: ["\\syncro"]
  - name: N-able Take Control
    files: [basupsrvc.exe, basupsrvccnfg.exe, basupapp.exe]
    paths: ["\\take control", "\\n-able"]
  - name: Kaseya VSA
    files: [agentmon.exe, kasaya.agentendpoint.exe]
    paths: ["\\kaseya"]
  - name: LogMeIn
    files: [logmein.exe, lmiguardiansvc.exe, ramaint.exe, logmeinsystray.exe]
    paths: ["\\logmein"]
  - name: GoToAssist
    files: [g2ax_comm_customer.exe, gotoassist.exe]
    paths: ["\\getgo", "\\gotoassist"]
  - name: Remote Utilities
    files: [rutserv.exe, rfusclient.exe]
    paths: ["\\remote utilities"]
  - name: Action1
    files: [action1_agent.exe, action1_remote.exe]
    paths: ["\\action1"]
  - name: TightVNC
    files: [tvnserver.exe]
    paths: ["\\tightvnc"]
  - name: UltraVNC
    files: [uvnc_service.exe, winvnc.exe]
    paths: ["\\ultravnc", "\\uvnc"]
  - name: RealVNC
    files: [vncserver.exe, winvnc4.exe]
    paths: ["\\realvnc"]
  - name: DWService
    files: [dwagent.exe, dwagsvc.exe]
    paths: ["\\dwagent"]
  - name: RustDesk
    files: [rustdesk.exe]
    paths: ["\\rustdesk"]
  - name: MeshCentral
